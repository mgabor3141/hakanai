<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hako-ephemeral</title>
    <style>
      :root { color-scheme: light dark; }
      body { font: 15px/1.5 system-ui, sans-serif; max-width: 680px; margin: 2rem auto; padding: 0 1rem; }
      header { display: flex; align-items: baseline; gap: .75rem; }
      h1 { font-size: 1.1rem; margin: 0; }
      #id { color: #888; font-size: .8rem; }
      #log { border: 1px solid #8884; border-radius: 8px; padding: 1rem; min-height: 320px; margin: 1rem 0; }
      .msg { margin: .35rem 0; }
      .user { text-align: right; }
      .user span, .agent span { display: inline-block; padding: .4rem .7rem; border-radius: 10px; white-space: pre-wrap; }
      .user span { background: #2f6fed; color: #fff; }
      .agent span { background: #8882; }
      .sys { color: #c80; font-size: .85rem; }
      form { display: flex; gap: .5rem; }
      input { flex: 1; padding: .6rem; border-radius: 8px; border: 1px solid #8886; }
      button { padding: .6rem 1rem; border-radius: 8px; border: 0; background: #2f6fed; color: #fff; cursor: pointer; }
      button.secondary { background: #8883; color: inherit; }
      button:disabled { opacity: .5; cursor: default; }
    </style>
  </head>
  <body>
    <header>
      <h1>hako-ephemeral</h1>
      <span id="id">no conversation</span>
      <button class="secondary" id="new" style="margin-left:auto">New conversation</button>
    </header>
    <div id="log"></div>
    <form id="form">
      <input id="input" placeholder="Message (stays inside this container)" autocomplete="off" disabled />
      <button id="send" type="submit" disabled>Send</button>
    </form>

    <script type="module">
      // A small ACP (Agent Client Protocol) client. JSON-RPC over the websocket
      // (newline-delimited), proxied by the control plane to pi-acp (or the stub)
      // inside the conversation's container.
      const log = document.getElementById("log");
      const idEl = document.getElementById("id");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");

      let ws = null, sessionId = null, nextId = 1, agentBubble = null;
      const pending = new Map();

      const add = (who, text) => {
        const d = document.createElement("div");
        d.className = `msg ${who}`;
        if (who === "sys") { d.textContent = text; }
        else { const s = document.createElement("span"); s.textContent = text; d.appendChild(s); }
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
        return d.querySelector("span") ?? d;
      };

      const rpc = (method, params) =>
        new Promise((resolve) => {
          const id = nextId++;
          pending.set(id, resolve);
          ws.send(JSON.stringify({ jsonrpc: "2.0", id, method, params }) + "\n");
        });

      // stdio-to-ws frames are concatenated JSON, not reliably newline-delimited
      // (its "connected" envelope has no trailing newline), so extract complete
      // objects by brace depth and return the unconsumed tail.
      function drain(s, cb) {
        let i = 0;
        while (i < s.length) {
          while (i < s.length && " \n\r\t".includes(s[i])) i++;
          if (i >= s.length) break;
          if (s[i] !== "{") { i++; continue; }
          let depth = 0, inStr = false, esc = false, j = i, done = false;
          for (; j < s.length; j++) {
            const c = s[j];
            if (inStr) {
              if (esc) esc = false; else if (c === "\\") esc = true; else if (c === '"') inStr = false;
            } else if (c === '"') inStr = true;
            else if (c === "{") depth++;
            else if (c === "}") { if (--depth === 0) { j++; done = true; break; } }
          }
          if (!done) return s.slice(i);
          try { cb(JSON.parse(s.slice(i, j))); } catch {}
          i = j;
        }
        return s.slice(i);
      }

      function route(m) {
        if (m.id != null && pending.has(m.id)) {
          pending.get(m.id)(m);
          pending.delete(m.id);
          return;
        }
        if (m.method === "session/update") {
          const u = m.params?.update;
          if (u?.sessionUpdate === "agent_message_chunk") {
            if (!agentBubble) agentBubble = add("agent", "");
            agentBubble.textContent += u.content?.text ?? "";
            log.scrollTop = log.scrollHeight;
          }
        }
      }

      const setReady = (r) => { input.disabled = !r; sendBtn.disabled = !r; if (r) input.focus(); };

      async function newConversation() {
        log.innerHTML = ""; setReady(false); sessionId = null; pending.clear();
        const { id } = await (await fetch("/api/conversations", { method: "POST" })).json();
        idEl.textContent = id;
        ws = new WebSocket(`ws://${location.host}/api/conversations/${id}/ws`);
        let buf = "";
        ws.addEventListener("message", (ev) => { buf = drain(buf + ev.data, route); });
        await new Promise((r) => ws.addEventListener("open", () => r()));
        await rpc("initialize", { protocolVersion: 1, clientCapabilities: { fs: { readTextFile: false, writeTextFile: false } } });
        const sn = await rpc("session/new", { cwd: "/work", mcpServers: [] });
        if (sn.error) { add("sys", `session/new failed: ${sn.error.message ?? JSON.stringify(sn.error)} (model auth needed?)`); return; }
        sessionId = sn.result?.sessionId;
        setReady(true);
      }

      document.getElementById("new").addEventListener("click", newConversation);
      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || !sessionId) return;
        add("user", text); input.value = ""; agentBubble = null; setReady(false);
        const r = await rpc("session/prompt", { sessionId, prompt: [{ type: "text", text }] });
        if (r.error) add("sys", `prompt failed: ${r.error.message ?? JSON.stringify(r.error)}`);
        agentBubble = null; setReady(true);
      });

      newConversation();
    </script>
  </body>
</html>
