# The persistent control plane. It orchestrates ephemeral agent containers via
# the docker socket and joins the internal agent network at boot (see
# orchestrator.ensureInfra). Agents are NOT defined here -- they are created and
# destroyed per conversation at runtime.
name: hakanai

services:
  control-plane:
    build: ./control-plane
    init: true
    user: root # needs the docker socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Durable last-activity index for the idle reaper, so a control plane
      # restart cannot extend the deletion clock (see orchestrator/server). Holds
      # only {conversationId: timestamp}; no conversation content lives here.
      - hakanai-state:/state
    ports:
      - "127.0.0.1:8800:8800"
    environment:
      - PORT=8800
      # The baked agent image spawned per conversation.
      - AGENT_IMAGE=${AGENT_IMAGE:-hakanai-agent:dev}
      # Model auth (OpenAI-compatible endpoint), injected into each agent. Put
      # these in a .env file next to this compose file (gitignored).
      - HAKANAI_MODEL_BASE_URL=${HAKANAI_MODEL_BASE_URL:-}
      - HAKANAI_MODEL_API_KEY=${HAKANAI_MODEL_API_KEY:-}
      - HAKANAI_MODEL=${HAKANAI_MODEL:-}
      # Extra hosts the agent may reach, on top of the model endpoint (whose host
      # is derived from HAKANAI_MODEL_BASE_URL automatically). Usually empty.
      - EGRESS_ALLOW=${EGRESS_ALLOW:-}

volumes:
  hakanai-state:
