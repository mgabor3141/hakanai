# The persistent control plane. It orchestrates ephemeral agent containers via
# the docker socket and joins the internal agent network at boot (see
# orchestrator.ensureInfra). Agents are NOT defined here -- they are created and
# destroyed per conversation at runtime.
name: hakanai

services:
  control-plane:
    build: ./control-plane
    init: true
    user: root # needs the docker socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Durable last-activity index for the idle reaper, so a control plane
      # restart cannot extend the deletion clock (see orchestrator/server). Holds
      # only {conversationId: timestamp}; no conversation content lives here.
      - hakanai-state:/state
    ports:
      - "127.0.0.1:8800:8800"
    environment:
      - PORT=8800
      # The baked images spawned/run by the control plane.
      - AGENT_IMAGE=${AGENT_IMAGE:-hakanai-agent:dev}
      - INFERENCE_IMAGE=${INFERENCE_IMAGE:-hakanai-inference:dev}
      # Google Cloud config (NON-secret): which project/region/model. The real
      # credential is NOT here -- it lives on the state volume as adc.json
      # (written by the "Connect Google" flow) and is read only by the sidecar.
      # Put these in a .env file next to this compose file (gitignored).
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-us-central1}
      - HAKANAI_MODEL=${HAKANAI_MODEL:-gemini-2.5-pro}
      # The shared state volume's docker name, so the control plane can mount it
      # into the sidecar (pinned below so both agree).
      - HAKANAI_STATE_VOLUME=hakanai-state
      # Extra hosts the sidecar may reach, on top of the Vertex + token
      # endpoints. Usually empty.
      - EGRESS_ALLOW=${EGRESS_ALLOW:-}

volumes:
  hakanai-state:
    # Pinned name (no compose project prefix) so the control plane can mount the
    # same volume into the ad-hoc sidecar container by a stable name.
    name: hakanai-state
